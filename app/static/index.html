<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Прогнозирование дефолта по кредитной карте</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Прогнозирование риска дефолта по кредитной карте</h1>
      <p>Нейросетевая модель на основе датасета UCI Default of Credit Card Clients</p>
    </header>
    <div class="container">
      <div class="card">
        <h2>Данные клиента</h2>
        <div class="grid">
          <div class="field">
            <label>Кредитный лимит (LIMIT_BAL)</label
            ><input type="number" id="LIMIT_BAL" value="50000" />
          </div>
          <div class="field">
            <label>Пол (1=муж, 2=жен)</label
            ><select id="SEX">
              <option value="1">1 — Мужской</option>
              <option value="2" selected>2 — Женский</option>
            </select>
          </div>
          <div class="field">
            <label>Образование (1-4)</label
            ><select id="EDUCATION">
              <option value="1">1 — Аспирантура</option>
              <option value="2" selected>2 — Университет</option>
              <option value="3">3 — Школа</option>
              <option value="4">4 — Другое</option>
            </select>
          </div>
          <div class="field">
            <label>Семейное положение (1-3)</label
            ><select id="MARRIAGE">
              <option value="1" selected>1 — Женат/замужем</option>
              <option value="2">2 — Холост/не замужем</option>
              <option value="3">3 — Другое</option>
            </select>
          </div>
          <div class="field"><label>Возраст</label><input type="number" id="AGE" value="30" /></div>
          <div class="field">
            <label>Статус оплаты PAY_0</label><input type="number" id="PAY_0" value="0" />
          </div>
          <div class="field">
            <label>Статус оплаты PAY_2</label><input type="number" id="PAY_2" value="0" />
          </div>
          <div class="field">
            <label>Статус оплаты PAY_3</label><input type="number" id="PAY_3" value="0" />
          </div>
          <div class="field">
            <label>Статус оплаты PAY_4</label><input type="number" id="PAY_4" value="0" />
          </div>
          <div class="field">
            <label>Статус оплаты PAY_5</label><input type="number" id="PAY_5" value="0" />
          </div>
          <div class="field">
            <label>Статус оплаты PAY_6</label><input type="number" id="PAY_6" value="0" />
          </div>
          <div class="field">
            <label>Сумма счёта BILL_AMT1</label><input type="number" id="BILL_AMT1" value="10000" />
          </div>
          <div class="field">
            <label>Сумма счёта BILL_AMT2</label><input type="number" id="BILL_AMT2" value="9000" />
          </div>
          <div class="field">
            <label>Сумма счёта BILL_AMT3</label><input type="number" id="BILL_AMT3" value="8000" />
          </div>
          <div class="field">
            <label>Сумма счёта BILL_AMT4</label><input type="number" id="BILL_AMT4" value="7000" />
          </div>
          <div class="field">
            <label>Сумма счёта BILL_AMT5</label><input type="number" id="BILL_AMT5" value="6000" />
          </div>
          <div class="field">
            <label>Сумма счёта BILL_AMT6</label><input type="number" id="BILL_AMT6" value="5000" />
          </div>
          <div class="field">
            <label>Оплата PAY_AMT1</label><input type="number" id="PAY_AMT1" value="1000" />
          </div>
          <div class="field">
            <label>Оплата PAY_AMT2</label><input type="number" id="PAY_AMT2" value="1000" />
          </div>
          <div class="field">
            <label>Оплата PAY_AMT3</label><input type="number" id="PAY_AMT3" value="1000" />
          </div>
          <div class="field">
            <label>Оплата PAY_AMT4</label><input type="number" id="PAY_AMT4" value="1000" />
          </div>
          <div class="field">
            <label>Оплата PAY_AMT5</label><input type="number" id="PAY_AMT5" value="1000" />
          </div>
          <div class="field">
            <label>Оплата PAY_AMT6</label><input type="number" id="PAY_AMT6" value="1000" />
          </div>
        </div>
      </div>

      <button class="btn" onclick="predict()">Предсказать риск дефолта</button>
      <div class="error" id="error">Ошибка при обращении к серверу</div>

      <div class="card" style="margin-top: 20px">
        <div class="result" id="result">
          <div class="verdict" id="verdict"></div>
          <div class="prob" id="prob"></div>
          <div class="risk" id="risk"></div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
